services:
  # PHP / Laravel (php-fpm)
  backend:
    build:
      context: ./backend
    container_name: gestion-backend
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: gestion_db
      DB_USERNAME: gestion_user
      DB_PASSWORD: gestion_pass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gestion-network

  # Nginx para servir Laravel
  nginx:
    image: nginx:1.27-alpine
    container_name: gestion-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - gestion-network

  # Node / React (Vite)
  frontend:
    build:
      context: ./frontend
    container_name: gestion-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: http://localhost:8080/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - gestion-network

  # Base de datos
  db:
    image: mysql:8.0
    container_name: gestion-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestion_db
      MYSQL_USER: gestion_user
      MYSQL_PASSWORD: gestion_pass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - gestion-network

volumes:
  db_data:

networks:
  gestion-network:
    driver: bridge